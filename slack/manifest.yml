# Slack app manifest for Synko.
#
# How to use this:
#   1. Go to https://api.slack.com/apps and click "Create New App".
#   2. Pick "From an app manifest", then choose your dev workspace.
#   3. Paste the contents of this file (YAML).
#   4. Slack creates the app. Click "Install to Workspace" to get a bot token.
#   5. Replace REPLACE_WITH_YOUR_PUBLIC_URL below with your ngrok / Vercel URL
#      *before* pasting (or edit the URLs in the app settings UI after).
#
# When the public URL changes (e.g. you restart ngrok with a new tunnel), update
# the URLs in the Slack app config UI under "Slash Commands", "Interactivity &
# Shortcuts", and "Event Subscriptions" — or re-import this manifest.

display_information:
  name: Synko
  description: A quiet coaching pet for cross-functional collaboration.
  background_color: "#3f0e40"

features:
  bot_user:
    display_name: Synko
    always_online: true

  app_home:
    home_tab_enabled: true              # the persistent "pet's home" tab
    messages_tab_enabled: true          # DM tab visible
    messages_tab_read_only_enabled: false  # let users type in the DM

  slash_commands:
    - command: /synko-demo
      description: Walk through the Synko demo flow in DMs.
      url: https://elf-oversweet-crewman.ngrok-free.dev/api/slack/commands
      should_escape: false
    - command: /synko-channels
      description: Pick which channels Synko should join.
      url: https://elf-oversweet-crewman.ngrok-free.dev/api/slack/commands
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write          # post messages as the bot
      - commands            # accept slash commands
      - im:history          # read DMs (future: ambient nudges)
      - im:write            # open DMs with users
      - users:read          # look up user info if needed
      - channels:read       # list a user's public channels for the picker
      - channels:join       # auto-join the channels the user picks
      - channels:history    # read messages in joined channels (future analysis)
      - groups:read         # see which private channels Synko is already in

settings:
  event_subscriptions:
    request_url: https://elf-oversweet-crewman.ngrok-free.dev/api/slack/events
    bot_events:
      - app_home_opened   # future: greet users when they first open the DM
      # - message.im      # uncomment when we want to listen to DMs

  interactivity:
    is_enabled: true
    request_url: https://elf-oversweet-crewman.ngrok-free.dev/api/slack/interactions

  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
